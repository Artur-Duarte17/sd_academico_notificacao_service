spring.application.name=notificacao-service

server.port=8085

# Necessario para o Swagger gerar URLs corretas atras do API Gateway (X-Forwarded-*)
server.forward-headers-strategy=framework

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=jdbc:h2:mem:notificacaodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# O Hibernate (ddl-auto=create) é quem cria a tabela. Para que o data.sql rode
# DEPOIS da criação das tabelas (e não seja apagado pelo Hibernate), adiamos a
# inicialização por script. O schema.sql manual foi removido para não duplicar a
# gestão do schema.
spring.jpa.defer-datasource-initialization=true

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
